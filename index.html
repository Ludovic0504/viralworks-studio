<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5, viewport-fit=cover" />
    <title>ViralWorks_Studio</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="ViralWorks">
    <link rel="icon" type="image/png" href="/Logo_VWS_sans_bordure.png" />
    <link rel="apple-touch-icon" href="/Logo_VWS_sans_bordure.png">
    <link rel="canonical" href="https://viralworks-studio.com/" />
    <meta property="og:url" content="https://viralworks-studio.com/" />
    <meta property="og:title" content="ViralWorks Studio" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fr_FR" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var q = new URLSearchParams(location.search);
        var shouldRecover =
          q.get("vws_recover") === "1" || q.get("payment") === "success";
        if (!shouldRecover || !("serviceWorker" in navigator)) return;
        try {
          if (sessionStorage.getItem("vws_sw_recovery_pending") === "1") return;
          sessionStorage.setItem("vws_sw_recovery_pending", "1");
        } catch (e) {
          return;
        }
        navigator.serviceWorker
          .getRegistrations()
          .then(function (regs) {
            if (!regs.length) {
              try { sessionStorage.removeItem("vws_sw_recovery_pending"); } catch (e) {}
              return;
            }
            return Promise.all(regs.map(function (r) { return r.unregister(); }));
          })
          .then(function () {
            if (!("caches" in window)) return;
            return caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (k) { return caches.delete(k); }));
            });
          })
          .then(function () {
            location.reload();
          })
          .catch(function () {
            try { sessionStorage.removeItem("vws_sw_recovery_pending"); } catch (e) {}
          });
      })();
    </script>
    <script type="module" src="/src/principal.jsx"></script>
  </body>
</html>
