# Build Vite + déploiement GitHub Pages
#
# Secrets requis (Settings → Secrets and variables → Actions → Secrets) :
#   VITE_SUPABASE_URL
#   VITE_SUPABASE_ANON_KEY
#
# Variables de dépôt (optionnelles) :
#   VITE_SITE_URL                    (ex. https://viralworks-studio.com)
#   VITE_STRIPE_PUBLISHABLE_KEY
#   VITE_META_PIXEL_ID               (optionnel)
#   VITE_POSTHOG_API_KEY             (clé projet phc_…)
#   VITE_POSTHOG_HOST                (ex. https://eu.i.posthog.com)
#   VITE_PEXELS_SERVER               (optionnel, ex. 1)
#   VITE_FEATURE_DECORS              (optionnel)
#
# Secrets optionnels :
#   VITE_PEXELS_API_KEY

name: Deploy frontend (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Supabase secrets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::error::Secrets manquants : définir VITE_SUPABASE_URL et VITE_SUPABASE_ANON_KEY dans GitHub Actions (Settings → Secrets)."
            exit 1
          fi

      - name: Build (Vite)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ vars.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_PEXELS_API_KEY: ${{ secrets.VITE_PEXELS_API_KEY }}
          VITE_PEXELS_SERVER: ${{ vars.VITE_PEXELS_SERVER }}
          VITE_META_PIXEL_ID: ${{ vars.VITE_META_PIXEL_ID }}
          VITE_POSTHOG_API_KEY: ${{ vars.VITE_POSTHOG_API_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.VITE_POSTHOG_HOST }}
          VITE_FEATURE_DECORS: ${{ vars.VITE_FEATURE_DECORS }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
