# Build Vite + déploiement OVH (FTP) à chaque push sur main
#
# Secrets requis (Settings → Secrets and variables → Actions → Secrets) :
#   FTP_PASSWORD
#   VITE_SUPABASE_URL
#   VITE_SUPABASE_ANON_KEY
#   SUPABASE_ACCESS_TOKEN          (CLI : migrations + edge functions)
#
# Secret Supabase (dashboard, pas GitHub) — tracking bio /go/* :
#   SERVICE_ROLE_KEY dans Edge Functions → Secrets (utilisé par go-redirect)
#   SITE_URL=https://viralworks-studio.com (retours Stripe — jamais Netlify)
#
# Variables de dépôt (optionnelles, pour le build Vite) :
#   VITE_SITE_URL, VITE_STRIPE_PUBLISHABLE_KEY, VITE_META_PIXEL_ID, etc.
# Secrets requis pour les images Pexels (cartes format Campagne VWS) :
#   VITE_PEXELS_API_KEY
# Ne pas définir VITE_PEXELS_SERVER=1 sur OVH (pas de /api/pexels-search).

name: Deploy to OVH (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ovh-ftp
  cancel-in-progress: true

env:
  SUPABASE_PROJECT_REF: wuvtfhletxieocetzppo

jobs:
  supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify Supabase CLI token
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Secret manquant : définir SUPABASE_ACCESS_TOKEN (token CLI depuis https://supabase.com/dashboard/account/tokens)."
            exit 1
          fi

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --yes

      - name: Retirer Netlify de Supabase Auth + forcer SITE_URL
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ env.SUPABASE_PROJECT_REF }}
        run: |
          node scripts/sync-canonical-auth-urls.mjs
          supabase secrets set SITE_URL=https://viralworks-studio.com --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push Supabase migrations
        id: db_push
        continue-on-error: true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --linked --yes

      - name: Report migration failure
        if: steps.db_push.outcome == 'failure'
        run: |
          echo "::warning::Les migrations Supabase ont échoué. Le frontend OVH sera quand même déployé ; vérifier les logs de l'étape Push Supabase migrations."

      - name: Verify link_clicks migrations on remote
        if: steps.db_push.outcome == 'success'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          list="$(supabase migration list --linked)"
          echo "$list"
          for version in 20260521120000 20260523120000; do
            line="$(echo "$list" | grep -F "$version" | head -1 || true)"
            if [ -z "$line" ]; then
              echo "::error::Migration $version introuvable dans migration list."
              exit 1
            fi
            if ! echo "$line" | grep -qE "${version}[[:space:]]*\|[[:space:]]*${version}[[:space:]]*\|"; then
              echo "::error::Migration $version non appliquée sur le remote (Local/Remote désynchronisés)."
              exit 1
            fi
          done
          echo "OK: migrations link_clicks présentes sur le remote."

      - name: Deploy go-redirect edge function
        if: steps.db_push.outcome == 'success'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy go-redirect \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --no-verify-jwt \
            --use-api

      - name: Deploy stripe-payment edge function
        if: steps.db_push.outcome == 'success'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy stripe-payment \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --use-api

      - name: Smoke test go-redirect
        if: steps.db_push.outcome == 'success'
        env:
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::error::VITE_SUPABASE_ANON_KEY requis pour le smoke test go-redirect."
            exit 1
          fi
          body="$(curl -sf "https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/go-redirect?source=facebook&client=1" \
            -H "apikey: ${VITE_SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${VITE_SUPABASE_ANON_KEY}")"
          echo "$body"
          echo "$body" | grep -q '"ok":true' || (echo "::error::go-redirect n'a pas renvoyé ok:true" && exit 1)

  deploy-ovh:
    needs: supabase
    if: ${{ always() && needs.supabase.result != 'cancelled' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Supabase secrets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::error::Secrets manquants : définir VITE_SUPABASE_URL et VITE_SUPABASE_ANON_KEY dans GitHub Actions (Settings → Secrets)."
            exit 1
          fi

      - name: Verify Pexels build config
        env:
          VITE_PEXELS_API_KEY: ${{ secrets.VITE_PEXELS_API_KEY }}
          VITE_PEXELS_SERVER: ${{ vars.VITE_PEXELS_SERVER }}
        run: |
          if [ -z "$VITE_PEXELS_API_KEY" ]; then
            echo "::error::Secret manquant : définir VITE_PEXELS_API_KEY dans GitHub Actions (Settings → Secrets). Sans lui, les images Pexels sont absentes en production OVH."
            exit 1
          fi
          if [ "$VITE_PEXELS_SERVER" = "1" ]; then
            echo "::error::VITE_PEXELS_SERVER=1 est incompatible avec OVH statique (/api/pexels-search renvoie index.html). Supprimer la variable ou la vider dans Settings → Variables."
            exit 1
          fi

      - name: Reject Netlify in VITE_SITE_URL
        env:
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}
        run: |
          if [ -n "$VITE_SITE_URL" ] && echo "$VITE_SITE_URL" | grep -qi netlify; then
            echo "::error::VITE_SITE_URL contient Netlify. GitHub → Settings → Variables : mettre https://viralworks-studio.com"
            exit 1
          fi

      - name: Build (Vite)
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ vars.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_PEXELS_API_KEY: ${{ secrets.VITE_PEXELS_API_KEY }}
          VITE_PEXELS_SERVER: ${{ vars.VITE_PEXELS_SERVER }}
          VITE_META_PIXEL_ID: ${{ vars.VITE_META_PIXEL_ID }}
          VITE_POSTHOG_API_KEY: ${{ vars.VITE_POSTHOG_API_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.VITE_POSTHOG_HOST }}
          VITE_FEATURE_DECORS: ${{ vars.VITE_FEATURE_DECORS }}
          VITE_DEMO_VIDEO_CHANTIER_URL: https://wuvtfhletxieocetzppo.supabase.co/storage/v1/object/public/demo-videos/Artisan.mp4
          VITE_DEMO_VIDEO_MOTEUR_URL: https://wuvtfhletxieocetzppo.supabase.co/storage/v1/object/public/demo-videos/HightTech_Essai_4.mp4
          VITE_DEMO_VIDEO_YACHT_URL: https://wuvtfhletxieocetzppo.supabase.co/storage/v1/object/public/demo-videos/Cosmetic_Essai_2.mp4
        run: npm run build

      - name: Deploy dist to OVH FTP
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: npm run deploy:ovh-ftp
