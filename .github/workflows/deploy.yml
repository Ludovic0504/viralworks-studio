# Build Vite + déploiement OVH (FTP) à chaque push sur main
#
# Secrets requis (Settings → Secrets and variables → Actions → Secrets) :
#   FTP_PASSWORD
#   VITE_SUPABASE_URL
#   VITE_SUPABASE_ANON_KEY
#
# Variables de dépôt (optionnelles, pour le build Vite) :
#   VITE_SITE_URL, VITE_STRIPE_PUBLISHABLE_KEY, VITE_META_PIXEL_ID, etc.
# Secrets requis pour les images Pexels (cartes format Campagne VWS) :
#   VITE_PEXELS_API_KEY
# Ne pas définir VITE_PEXELS_SERVER=1 sur OVH (pas de /api/pexels-search).

name: Deploy to OVH (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ovh-ftp
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Supabase secrets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::error::Secrets manquants : définir VITE_SUPABASE_URL et VITE_SUPABASE_ANON_KEY dans GitHub Actions (Settings → Secrets)."
            exit 1
          fi

      - name: Verify Pexels build config
        env:
          VITE_PEXELS_API_KEY: ${{ secrets.VITE_PEXELS_API_KEY }}
          VITE_PEXELS_SERVER: ${{ vars.VITE_PEXELS_SERVER }}
        run: |
          if [ -z "$VITE_PEXELS_API_KEY" ]; then
            echo "::error::Secret manquant : définir VITE_PEXELS_API_KEY dans GitHub Actions (Settings → Secrets). Sans lui, les images Pexels sont absentes en production OVH."
            exit 1
          fi
          if [ "$VITE_PEXELS_SERVER" = "1" ]; then
            echo "::error::VITE_PEXELS_SERVER=1 est incompatible avec OVH statique (/api/pexels-search renvoie index.html). Supprimer la variable ou la vider dans Settings → Variables."
            exit 1
          fi

      - name: Build (Vite)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ vars.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_PEXELS_API_KEY: ${{ secrets.VITE_PEXELS_API_KEY }}
          VITE_PEXELS_SERVER: ${{ vars.VITE_PEXELS_SERVER }}
          VITE_META_PIXEL_ID: ${{ vars.VITE_META_PIXEL_ID }}
          VITE_POSTHOG_API_KEY: ${{ vars.VITE_POSTHOG_API_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.VITE_POSTHOG_HOST }}
          VITE_FEATURE_DECORS: ${{ vars.VITE_FEATURE_DECORS }}
        run: npm run build

      - name: Deploy dist to OVH FTP
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: npm run deploy:ovh-ftp
