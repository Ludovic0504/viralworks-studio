# Configuration Supabase pour les Edge Functions

# Désactiver la vérification JWT pour le webhook Stripe
# Les webhooks Stripe n'envoient pas de header Authorization
# La vérification de signature Stripe est suffisante pour sécuriser le webhook
[functions.stripe-webhook]
verify_jwt = false

# Webhook fournisseurs (Printful / Gelato) : pas de Bearer JWT,
# sécurité assurée par secret webhook côté fonction.
[functions.welcome-gift-provider-webhook]
verify_jwt = false

# Sync fournisseur: autorise un déclenchement batch sans JWT (cron).
[functions.welcome-gift-provider-sync]
verify_jwt = false

# Désactiver la vérification JWT pour le proxy d'images
# Les balises <img> ne peuvent pas envoyer de headers d'authentification
# La validation de l'URL (uniquement Hailuo) est suffisante pour sécuriser
[functions.image-proxy]
verify_jwt = false

# Veo / Vertex depuis le navigateur : le preflight CORS (OPTIONS) ne passe pas la vérification
# JWT de la passerelle sans cela. L’auth utilisateur est faite dans la fonction (Bearer + getUser).
[functions.vertex-veo-video]
verify_jwt = false

# Même motif : le navigateur envoie OPTIONS sans JWT valide pour le preflight CORS.
[functions.video-postprocess]
verify_jwt = false

# Studio avatar : preflight CORS depuis localhost:5173 ; auth JWT dans la fonction (getUser).
[functions.studio-generate-avatar]
verify_jwt = false
