# Configuration Supabase pour les Edge Functions

# Désactiver la vérification JWT pour le webhook Stripe
# Les webhooks Stripe n'envoient pas de header Authorization
# La vérification de signature Stripe est suffisante pour sécuriser le webhook
[functions.stripe-webhook]
verify_jwt = false

# Webhook fournisseurs (Printful / Gelato) : pas de Bearer JWT,
# sécurité assurée par secret webhook côté fonction.
[functions.welcome-gift-provider-webhook]
verify_jwt = false

# Sync fournisseur: autorise un déclenchement batch sans JWT (cron).
[functions.welcome-gift-provider-sync]
verify_jwt = false

# Désactiver la vérification JWT pour le proxy d'images
# Les balises <img> ne peuvent pas envoyer de headers d'authentification
# La validation de l'URL (uniquement Hailuo) est suffisante pour sécuriser
[functions.image-proxy]
verify_jwt = false

# Veo / Vertex depuis le navigateur : le preflight CORS (OPTIONS) ne passe pas la vérification
# JWT de la passerelle sans cela. L’auth utilisateur est faite dans la fonction (Bearer + getUser).
[functions.vertex-veo-video]
verify_jwt = false

# Même motif : le navigateur envoie OPTIONS sans JWT valide pour le preflight CORS.
[functions.video-postprocess]
verify_jwt = false

# Studio avatar : preflight CORS depuis localhost:5173 ; auth JWT dans la fonction (getUser).
[functions.studio-generate-avatar]
verify_jwt = false

# Liens bio /go/* : redirection publique sans JWT (passerelle : apikey anon en query).
[functions.go-redirect]
verify_jwt = false

# Vérification prénom/nom avant inscription (appel public, pas de liste exposée côté client).
[functions.validate-display-name]
verify_jwt = false

# Connexion email sans CAPTCHA navigateur (service role côté serveur ; inscription garde Turnstile).
[functions.auth-email-sign-in]
verify_jwt = false

# Auth Hook Supabase : before-user-created (secret AUTH_HOOK_SECRET).
[functions.auth-before-user-created]
verify_jwt = false

# pg_net depuis auth.users INSERT : pas de JWT, sécurisé par x-hook-secret.
[functions.admin-signup-notify]
verify_jwt = false

# Message de bienvenue onboarding (pg_net depuis auth.users INSERT).
[functions.welcome-private-message]
verify_jwt = false

# Rattrapage : emails récap des réponses onboarding.
[functions.backfill-onboarding-answers-notify]
verify_jwt = false

# Rattrapage : emails de confirmation onboarding pour inscriptions passées.
[functions.backfill-onboarding-notify]
verify_jwt = false

# Rattrapage client : message de bienvenue dès la 1re session (JWT).
[functions.ensure-welcome-private-message]
verify_jwt = true

# Suivi onboarding après réponse utilisateur (pg_net depuis community_private_messages INSERT).
[functions.onboarding-private-followup]
verify_jwt = false

# Réponse rapide onboarding (bouton, sans message utilisateur dans le chat).
[functions.onboarding-private-quick-reply]
verify_jwt = true

# Mise à jour profil : auth JWT vérifiée dans la fonction (getUser).
[functions.update-user-profile]
verify_jwt = false

# community-read-messages, translate-community-message, admin-get-community-message-raw :
# verify_jwt laissé à true (défaut) pour que le JWT utilisateur soit transmis au gateway.
[functions.community-read-messages]
verify_jwt = true

# OAuth linking réseaux sociaux (JWT vérifié dans la fonction)
[functions.social-oauth-start]
verify_jwt = false

# Callback OAuth plateformes (pas de JWT — redirect navigateur)
[functions.social-oauth-callback]
verify_jwt = false

[functions.social-oauth-disconnect]
verify_jwt = false
